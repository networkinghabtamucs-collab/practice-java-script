        .navigation {
            display: flex;

            margin-right: auto;

        }

        main {
            display: grid;

            min-width: 350px;
        }

        section {
            display: grid;
            grid-template-columns: 50% 50%;
            box-shadow: 3px 4px 8px grey;
            border-radius: 12px;
            width: auto;
            margin: 10px;

        }

        .photos {
            width: 151px;
            height: auto;
        }

        .photos img {

            width: 150px;
            height: 141px;
            min-height: 80px;

            border-bottom-left-radius: 12px;

        .contents {

            width: auto;

        .foodname {

        }

        .foodprice {

        }

        hr {

        }

        @media (max-width:660px) {
            main {

                margin-right: auto;
            }

            .navigation ul li a {

                min-width: 300px;
                padding: 13px;
                margin-left: auto;
                margin-right: auto;
            }

            .header {

            }
        }
