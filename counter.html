<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>counter</title>
    <style>
        .container {
            background-color: bisque;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        .header {
            color: red;
            display: flex;
        }

        .header h1 {
            margin: 10px auto;
            display: block;
            padding: 10px;
            font-size: 50px;
            font-weight: 900;
        }

        .spans {
            display: flex;
            margin: 0px auto;
            justify-content: center;
            align-items: center;
        }

        .spans span {
            padding: 30px 100px;
            font-size: 60px;
            font-weight: 900;
        }

        .btns {
            display: flex;
            margin: 10px auto;
            justify-content: center;
            align-items: center;
        }

        .btns button {
            margin: 5px;
            padding: auto;
            padding-top: 5px;
            padding-bottom: 5px;
            width: 139px;
            background-color: rgb(255, 0, 183);
            color: rgb(251, 251, 251);
            font-size: 24px;
            font-weight: 500;
        }
        .btns button:hover{
            background-color: rgb(129, 65, 123);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 id="myheader">THE NUMBER COUNTER</h1>
        </div>
        <div class="spans">
            <span id="display">0</span>
        </div>

        <div class="btns">
            <button id="decrease" class="decrease btn">
                <span>&darr;</span> decrease
            </button>
            <button id="reset" class="reset btn"><span>&times;</span> reset</button>
            <button id="increase" class="increase btn">
                <span>&uarr;</span> increase
            </button>
        </div>
    </div>
    <script>
        const counts = document.getElementById("display");
        let count = 0;
        const btns = document.querySelectorAll(".btn");
        btns.forEach(function (b) {
            b.addEventListener("click", function (e) {
                const styles = e.currentTarget.classList;
                if (styles.contains("decrease")) {
                    count--;
                } else if (styles.contains("increase")) {
                    count++;
                } else {
                    count = 0;
                }

                counts.textContent = count;
                if (count > 0) {
                    counts.style.color = "green";
                    document.getElementById('myheader').style.color = 'green';
                } else if (count < 0) {
                    counts.style.color = "red";
                    document.getElementById('myheader').style.color = 'red';

                } else {
                    counts.style.color = "black";
                    document.getElementById('myheader').style.color = 'black';

                }
            });
        });
    </script>
</body>

</html>
